<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新能源热利用与热发电期末刷题</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">新能源热利用与热发电 · 期末复习</p>
        <h1>新能源热利用与热发电刷题网站</h1>
        <p class="subtitle">按题型练习、乱序抽题、错题收藏和背答案模式都保存在当前题库的浏览器记录中。</p>
      </div>
      <button class="ghost-button" id="themeToggle" type="button">夜间模式</button>
    </header>

    <section class="stats-grid" aria-label="学习进度">
      <div class="stat-card"><span>总题数</span><strong id="totalCount">0</strong></div>
      <div class="stat-card"><span>当前范围</span><strong id="filteredCount">0</strong></div>
      <div class="stat-card"><span>已完成</span><strong id="completedCount">0</strong></div>
      <div class="stat-card"><span>错题</span><strong id="wrongCount">0</strong></div>
      <div class="stat-card"><span>收藏</span><strong id="favoriteCount">0</strong></div>
    </section>

    <main class="workspace">
      <aside class="control-panel" aria-label="刷题控制">
        <div class="control-block">
          <label for="searchInput">搜索</label>
          <input id="searchInput" type="search" placeholder="题目、答案、分类关键词">
        </div>

        <div class="control-block">
          <span class="label">题型分类</span>
          <div class="chip-group" id="typeFilters">
            <button class="chip active" data-type="all" type="button">全部题目</button>
            <button class="chip" data-type="single" type="button">单选题</button>
            <button class="chip" data-type="multiple" type="button">多选题</button>
            <button class="chip" data-type="judge" type="button">判断题</button>
            <button class="chip" data-type="blank" type="button">填空题</button>
            <button class="chip" data-type="essay" type="button">大题</button>
          </div>
        </div>

        <div class="control-block">
          <span class="label">刷题模式</span>
          <div class="mode-grid">
            <button class="mode-button active" id="orderModeBtn" type="button">顺序刷题</button>
            <button class="mode-button" id="randomModeBtn" type="button">乱序刷题</button>
            <button class="mode-button" id="unfinishedOnlyBtn" type="button">只看未完成</button>
            <button class="mode-button" id="memorizeModeBtn" type="button">背答案模式</button>
          </div>
        </div>

        <div class="control-block">
          <span class="label">快速入口</span>
          <div class="mode-grid">
            <button class="mode-button" id="wrongOnlyBtn" type="button">查看错题</button>
            <button class="mode-button" id="favoriteOnlyBtn" type="button">查看收藏</button>
            <button class="mode-button danger-soft" id="resetScopeBtn" type="button">重置当前范围进度</button>
          </div>
        </div>

        <div class="range-summary">
          <div><span>当前范围</span><strong id="scopeName">全部题目</strong></div>
          <div><span>当前模式</span><strong id="modeName">顺序</strong></div>
          <div><span>已刷</span><strong id="scopeCompleted">0 / 0</strong></div>
          <div><span>剩余</span><strong id="scopeRemaining">0</strong></div>
        </div>
      </aside>

      <section class="question-area">
        <div class="question-nav">
          <button class="nav-button" id="prevBtn" type="button">上一题</button>
          <span id="positionText">第 0 / 0 题</span>
          <button class="nav-button" id="nextBtn" type="button">下一题</button>
        </div>

        <div id="emptyState" class="empty-state hidden">
          <h2>当前范围内的题目已经全部刷完。</h2>
          <p>可以重新刷当前范围，或切换到错题、收藏继续复习。</p>
          <div class="empty-actions">
            <button id="restartScopeBtn" type="button">重新刷当前范围</button>
            <button id="emptyWrongBtn" type="button">查看错题</button>
            <button id="emptyFavoriteBtn" type="button">查看收藏</button>
            <button id="emptyAllBtn" type="button">返回全部题目</button>
          </div>
        </div>

        <article class="question-card" id="questionCard">
          <div class="question-meta">
            <span id="questionType">题型</span>
            <span id="questionCategory">分类</span>
            <span id="questionDone" class="done-badge">未完成</span>
          </div>
          <div class="question-title-row">
            <h2 id="questionTitle"></h2>
            <button class="favorite-button" id="favoriteBtn" type="button">收藏</button>
          </div>
          <div id="answerInputArea" class="answer-input-area"></div>
          <div class="action-row">
            <button id="submitBtn" type="button">提交答案</button>
            <button id="showAnswerBtn" type="button">查看答案</button>
            <button id="memorizedBtn" type="button">我已背过 / 标记完成</button>
            <button class="danger-soft" id="removeWrongBtn" type="button">从错题中移除</button>
          </div>
          <div id="feedback" class="feedback hidden"></div>
          <div id="answerPanel" class="answer-panel hidden">
            <h3>正确答案</h3>
            <div id="correctAnswer"></div>
            <div id="explanationBlock" class="explanation-block hidden">
              <h3>解析</h3>
              <div id="explanation"></div>
            </div>
          </div>
        </article>
      </section>
    </main>
  </div>

  <script src="data/questions/questions.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
